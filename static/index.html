<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaze_Zone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="toast.css">
    
    <style>
        :root {
            --bg-color: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        body {
            background-color: var(--bg-color);
            color: #a3a3a3;
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.02em;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); }
        .card-hover:hover { border-color: rgba(255, 255, 255, 0.2); transform: translateY(-1px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        /* 隐藏原有的 Loading 样式，改用更现代的 */
        .loading-wave { display: flex; gap: 4px; justify-content: center; padding: 40px; }
        .loading-wave div { width: 2px; height: 16px; background: rgba(255,255,255,0.2); animation: wave 1s infinite ease-in-out; }
        @keyframes wave { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(2); background: white; } }
    </style>
</head>
<body class="min-h-screen flex flex-col px-6 py-8 md:px-16 md:py-12">

    <div id="toastContainer" class="toast-container fixed top-4 right-4 z-50"></div>

    <header class="flex justify-between items-center mb-20 opacity-40 text-[10px] tracking-[0.3em] uppercase mono">
        <div class="flex items-center gap-4">
            <span class="text-white/80">Ashine Command</span>
            <span class="hidden md:inline border-l border-white/20 pl-4">MECH-ENGINEER / INVESTOR</span>
        </div>
        <div class="flex gap-6 items-center">
            <span id="pve-status" class="flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span> ACTIVE
            </span>
            <a href="https://github.com/yvyan/MyPage" target="_blank" class="hover:text-white transition">
                <i class="fab fa-github"></i>
            </a>
            <button onclick="openAdminModal()" class="hover:text-white transition">
                <i class="fas fa-user-lock"></i>
            </button>
        </div>
    </header>

    <div class="max-w-xl mx-auto w-full mb-16">
        <form onsubmit="handleSearch(event)" class="relative group">
            <input type="text" id="searchInput" placeholder="SEARCH SYSTEM..." 
                   class="w-full bg-transparent border-b border-white/10 py-2 px-8 text-sm focus:outline-none focus:border-white/40 transition mono">
            <div class="absolute left-0 top-2.5 opacity-20 group-focus-within:opacity-100 transition">
                <i class="fas fa-search text-xs"></i>
            </div>
            <select id="searchEngine" class="absolute right-0 top-2 bg-transparent text-[10px] opacity-20 focus:outline-none mono uppercase cursor-pointer">
                <option value="google">Google</option>
                <option value="bing">Bing</option>
                <option value="baidu">Baidu</option>
            </select>
        </form>
    </div>

    <main class="flex-grow max-w-7xl mx-auto w-full">
        <nav id="groupNav" class="flex flex-wrap gap-8 mb-12 text-xs uppercase tracking-widest mono opacity-30 hover:opacity-100 transition"></nav>

        <div id="navigation" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
            <div class="loading col-span-full">
                <div class="loading-wave"><div></div><div></div><div></div></div>
            </div>
        </div>
    </main>

    <footer class="mt-20 pt-8 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-4 opacity-30 text-[9px] tracking-widest uppercase mono">
        <div>&copy; 2026 ASHINE CLOUD HADOOP</div>
        <div class="flex gap-8">
            <span>Disk: 5TB (RAID-Z)</span>
            <span>Temp: 42°C</span>
        </div>
    </footer>

    <div id="adminModal" class="modal fixed inset-0 z-50 hidden bg-black/90 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="glass p-8 rounded-2xl w-full max-w-sm">
            <h2 class="text-sm uppercase tracking-widest mb-8 text-white/80">Authorize Access</h2>
            <form id="adminForm" onsubmit="handleLogin(event)" class="space-y-6">
                <input type="password" id="adminPassword" placeholder="PASSWORD" required
                       class="w-full bg-white/5 border border-white/10 p-3 rounded-lg focus:outline-none focus:border-white/30 text-sm mono">
                <div class="flex gap-4">
                    <button type="submit" class="flex-grow bg-white/10 hover:bg-white/20 py-3 rounded-lg text-xs tracking-widest transition">LOGIN</button>
                    <button type="button" onclick="closeAdminModal()" class="px-6 py-3 text-xs opacity-40">EXIT</button>
                </div>
            </form>
        </div>
    </div>

    <div id="confirmDialog" class="hidden">...</div>

    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>
